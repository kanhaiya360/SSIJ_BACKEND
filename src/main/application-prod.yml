spring:
  config:
    activate:
      on-profile: prod

  # Production database settings
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate  # Never use 'update' in production

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

# Production security
security:
  jwt:
    secret: ${JWT_SECRET}  # Must be set as environment variable

logging:
  level:
    com.akeshya: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

server:
  port: 8080